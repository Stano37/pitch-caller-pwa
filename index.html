<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f5f46">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Pitch Caller">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Pitch Caller</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" href="./icons/icon-192.png">
    <link rel="apple-touch-icon" href="./icons/icon-192.png">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell" aria-labelledby="app-title">
      <header class="topbar">
        <div>
          <p class="eyebrow">One-way catcher audio</p>
          <h1 id="app-title">Pitch Caller</h1>
        </div>
        <div class="status-stack" aria-live="polite">
          <span id="audio-status" class="status-pill status-idle">Locked</span>
          <span id="cache-status" class="cache-status">Cache pending</span>
        </div>
      </header>

      <section class="control-strip" aria-label="Audio controls">
        <button id="arm-audio" class="command-button primary" type="button">
          <span class="button-mark" aria-hidden="true">A</span>
          <span>Arm Audio</span>
        </button>
        <button id="test-audio" class="command-button" type="button" disabled>
          <span class="button-mark" aria-hidden="true">T</span>
          <span>Test</span>
        </button>
        <button id="replay-last" class="command-button" type="button" disabled>
          <span class="button-mark" aria-hidden="true">R</span>
          <span>Replay</span>
        </button>
        <button id="lock-toggle" class="command-button danger" type="button" disabled aria-pressed="false">
          <span class="button-mark" aria-hidden="true">L</span>
          <span>Mute/Lock</span>
        </button>
      </section>

      <p id="audio-detail" class="audio-detail" hidden></p>

      <section class="tracking-strip" aria-label="Pitch tracking">
        <div class="pitcher-control">
          <label for="pitcher-select">Pitcher</label>
          <select id="pitcher-select" class="pitcher-select"></select>
          <div class="pitcher-actions">
            <button id="add-pitcher" class="mini-button" type="button">Add</button>
            <button id="rename-pitcher" class="mini-button" type="button">Rename</button>
          </div>
        </div>
        <div class="game-actions">
          <span id="game-label" class="game-label">Game pending</span>
          <button id="new-game" class="mini-button" type="button">New Game</button>
          <button id="export-csv" class="mini-button" type="button">Export CSV</button>
        </div>
      </section>

      <section class="field-grid" aria-label="Pitch call builder">
        <div class="panel">
          <div class="panel-heading">
            <h2>Pitch</h2>
            <button id="clear-call" class="text-button" type="button" disabled>Clear</button>
          </div>
          <div id="pitch-options" class="option-grid pitch-grid"></div>
        </div>

        <div class="panel">
          <div class="panel-heading">
            <h2>Zone</h2>
            <span id="selected-pitch" class="selected-label">No pitch</span>
          </div>
          <div id="zone-options" class="option-grid zone-grid"></div>
        </div>
      </section>

      <section class="panel result-panel" aria-label="Pitch result">
        <div class="panel-heading">
          <h2>Result</h2>
          <span id="pending-result-label" class="selected-label">No pitch pending</span>
        </div>
        <div id="result-options" class="option-grid result-grid"></div>
      </section>

      <section class="analytics-grid" aria-label="Pitch analytics">
        <div class="panel stats-panel">
          <div class="panel-heading">
            <h2>Stats</h2>
            <div class="scope-toggle" role="group" aria-label="Stats scope">
              <button id="stats-current" class="scope-button" type="button" data-stats-scope="game" aria-pressed="true">Game</button>
              <button id="stats-cumulative" class="scope-button" type="button" data-stats-scope="cumulative" aria-pressed="false">Cumulative</button>
            </div>
          </div>
          <div id="stats-summary" class="stats-summary"></div>
          <div id="pitch-stats" class="pitch-stats"></div>
        </div>

        <div class="panel recent-panel">
          <div class="panel-heading">
            <h2>Recent</h2>
            <button id="undo-last" class="text-button" type="button" disabled>Undo Last</button>
          </div>
          <ol id="recent-log" class="recent-log"></ol>
        </div>
      </section>

      <section class="last-call" aria-live="polite" aria-label="Last call">
        <span class="last-label">Last</span>
        <strong id="last-call-text">None</strong>
      </section>
    </main>

    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
